name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  acp-mock-server:
    name: ACP mock server checks
    runs-on: macos-14

    defaults:
      run:
        working-directory: acp-mock-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.json

      - name: Test
        run: bun test

      - name: Entrypoint syntax check
        run: bash -n start.sh

  app:
    name: App checks
    runs-on: macos-14

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build native macOS window effects
        run: bun run build:macos-effects

      - name: Build web assets
        run: bun run build:web
