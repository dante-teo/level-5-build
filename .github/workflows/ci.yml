name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  native-app:
    name: Native app checks
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec app/project.yml --project app

      - name: Swift package tests
        run: swift test
        working-directory: app

      - name: Xcode app tests
        run: |
          xcodebuild test \
            -project "Level5 Build.xcodeproj" \
            -scheme "Level5 Build" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
        working-directory: app

      - name: Run script syntax check
        run: bash -n script/build_and_run.sh

  acp-mock-server:
    name: ACP mock server checks
    runs-on: macos-14

    defaults:
      run:
        working-directory: acp-mock-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.json

      - name: Test
        run: bun test

      - name: Entrypoint syntax check
        run: bash -n start.sh
