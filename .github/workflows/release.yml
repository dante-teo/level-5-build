name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to dry-run. Defaults to the committed package.json version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  macos:
    name: macOS release
    runs-on: macos-14

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          project_version="$(jq -r .version package.json)"

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
            dry_run="false"
          else
            version="${DISPATCH_VERSION:-$project_version}"
            tag="v$version"
            dry_run="true"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "error: release tags must match vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-IDENTIFIER" >&2
            exit 1
          fi

          prerelease="false"
          if [[ "$version" == *-* ]]; then
            prerelease="true"
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "dry_run=$dry_run"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Check release secrets
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          required=(
            APPLE_CERTIFICATE_P12
            APPLE_CERTIFICATE_PASSWORD
            MACOS_KEYCHAIN_PASSWORD
            ELECTROBUN_DEVELOPER_ID
            ELECTROBUN_TEAMID
            ELECTROBUN_APPLEID
            ELECTROBUN_APPLEIDPASS
          )

          if [[ "${{ steps.meta.outputs.dry_run }}" != "true" && "${{ steps.meta.outputs.prerelease }}" != "true" ]]; then
            required+=(HOMEBREW_TAP_TOKEN)
          fi

          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'error: missing required release secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply release version
        run: bun run version:sync -- "${{ steps.meta.outputs.tag }}"

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          keychain_path="$RUNNER_TEMP/level5-release.keychain-db"
          certificate_path="$RUNNER_TEMP/developer-id.p12"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$certificate_path"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            "$keychain_path"

      - name: Build and sign (electrobun build:stable)
        env:
          ELECTROBUN_CODESIGN: "true"
          ELECTROBUN_NOTARIZE: "true"
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
        run: bun run build:stable

      - name: Package release artifact
        id: package
        run: |
          set -euo pipefail

          output="$(GITHUB_REF_NAME="${{ steps.meta.outputs.tag }}" bun run release:package:mac)"
          echo "$output"
          echo "$output" | grep -E '^(artifact_name|artifact_path)=' >> "$GITHUB_OUTPUT"

      - name: Calculate artifact SHA-256
        id: sha
        run: |
          set -euo pipefail

          sha256="$(shasum -a 256 "${{ steps.package.outputs.artifact_path }}" | awk '{ print $1 }')"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Upload GitHub Release
        if: steps.meta.outputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.artifact_path }}

      - name: Checkout Homebrew tap
        if: steps.meta.outputs.dry_run != 'true' && steps.meta.outputs.prerelease != 'true'
        uses: actions/checkout@v4
        with:
          repository: dante-teo/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        if: steps.meta.outputs.dry_run != 'true' && steps.meta.outputs.prerelease != 'true'
        env:
          HOMEBREW_CASK_SHA256: ${{ steps.sha.outputs.sha256 }}
          HOMEBREW_CASK_ARTIFACT: ${{ steps.package.outputs.artifact_name }}
          GITHUB_REF_NAME: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          bun run release:cask -- ../homebrew-tap

          git -C ../homebrew-tap config user.name "github-actions[bot]"
          git -C ../homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C ../homebrew-tap add Casks/level5-build.rb

          if git -C ../homebrew-tap diff --cached --quiet; then
            echo "Homebrew cask already up to date."
            exit 0
          fi

          git -C ../homebrew-tap commit -m "Update level5-build to ${{ steps.meta.outputs.version }}"
          git -C ../homebrew-tap push

      - name: Sync committed version to main
        if: steps.meta.outputs.dry_run != 'true'
        run: |
          set -euo pipefail

          worktree_path="$RUNNER_TEMP/level5-main-sync"

          cleanup() {
            git worktree remove "$worktree_path" --force 2>/dev/null || true
          }
          trap cleanup EXIT

          git fetch origin main
          git worktree add "$worktree_path" origin/main

          (cd "$worktree_path/app" && bun run version:sync -- "${{ steps.meta.outputs.tag }}")

          if git -C "$worktree_path" diff --quiet -- app; then
            echo "main is already in sync with ${{ steps.meta.outputs.version }}"
          else
            git -C "$worktree_path" config user.name "github-actions[bot]"
            git -C "$worktree_path" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C "$worktree_path" add app
            git -C "$worktree_path" commit -m "Sync app version to ${{ steps.meta.outputs.version }} [skip ci]"
            git -C "$worktree_path" push origin HEAD:main
          fi

      - name: Delete temporary keychain
        if: always()
        run: |
          set -euo pipefail

          keychain_path="$RUNNER_TEMP/level5-release.keychain-db"
          if [[ -f "$keychain_path" ]]; then
            security delete-keychain "$keychain_path"
          fi
