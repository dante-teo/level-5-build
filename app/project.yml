name: Level5 Build
options:
  bundleIdPrefix: io.anvia.level5
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    CURRENT_PROJECT_VERSION: "0"
    MARKETING_VERSION: "0.0.0"
    SWIFT_VERSION: "6.0"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""
targets:
  Level5Core:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Level5Core
    info:
      path: Generated/Level5Core-Info.plist
      properties:
        CFBundleName: Level5Core
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.anvia.level5.build.core
  Level5BuildApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    productName: Level5 Build
    sources:
      - path: Sources/Level5BuildApp
      - path: Resources/Assets.xcassets
    dependencies:
      - target: Level5Core
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Level5 Build
        CFBundleName: Level5 Build
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: Copyright © 2026 Anvia.
    settings:
      base:
        PRODUCT_NAME: Level5 Build
        PRODUCT_MODULE_NAME: Level5BuildApp
        PRODUCT_BUNDLE_IDENTIFIER: io.anvia.level5.build
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
  Level5CoreTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/Level5CoreTests
    dependencies:
      - target: Level5Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.anvia.level5.build.core.tests
  Level5BuildAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    hostApplication: Level5BuildApp
    sources:
      - path: Tests/Level5BuildAppTests
    dependencies:
      - target: Level5BuildApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.anvia.level5.build.app.tests
schemes:
  Level5 Build:
    build:
      targets:
        Level5BuildApp: all
        Level5Core: all
        Level5CoreTests: [test]
        Level5BuildAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - Level5CoreTests
        - Level5BuildAppTests
    archive:
      config: Release
